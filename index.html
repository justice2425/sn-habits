<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Habits</title>
<style>
  :root {
    --bg:        var(--sn-stylekit-background-color, #ffffff);
    --fg:        var(--sn-stylekit-foreground-color, #1f2328);
    --panel:     var(--sn-stylekit-contrast-background-color, #f4f6f8);
    --panel-2:   var(--sn-stylekit-secondary-background-color, #ffffff);
    --border:    var(--sn-stylekit-border-color, #d8dce0);
    --muted:     var(--sn-stylekit-passive-color-1, #6b7177);
    --muted-2:   var(--sn-stylekit-passive-color-2, #9aa0a6);
    --accent:    var(--sn-stylekit-info-color, #2f6fed);
    --accent-fg: var(--sn-stylekit-info-contrast-color, #ffffff);
    --danger:    var(--sn-stylekit-danger-color, #e5484d);
    --success:   var(--sn-stylekit-success-color, #30a46c);
    --warning:   var(--sn-stylekit-warning-color, #c47900);
    --radius: 8px;
    --shadow: 0 6px 24px rgba(0,0,0,0.18);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; font-size:14px; line-height:1.4; -webkit-font-smoothing:antialiased; }
  #app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
  button,input,select,textarea { font-family:inherit; font-size:inherit; color:var(--fg); }
  button { background:transparent; border:1px solid transparent; color:var(--fg); border-radius:6px; padding:5px 10px; cursor:pointer; line-height:1.2; }
  button:hover { background:var(--panel-2); }
  button.primary { background:var(--accent); color:var(--accent-fg); border-color:var(--accent); }
  button.ghost { border-color:var(--border); }
  button.danger { color:var(--danger); }
  input[type=text],input[type=number],input[type=date],select { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:6px 8px; outline:none; width:100%; }
  input:focus,select:focus { border-color:var(--accent); }
  ::placeholder { color:var(--muted-2); }

  .toolbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:8px 12px; border-bottom:1px solid var(--border); background:var(--panel); }
  .toolbar .grow { flex:1 1 auto; }
  .seg { display:inline-flex; border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .seg button { border-radius:0; border:none; padding:5px 14px; }
  .seg button.active { background:var(--accent); color:var(--accent-fg); }
  .subhead { padding:6px 14px 0; color:var(--muted); font-size:13px; }
  .surface { flex:1 1 auto; overflow:auto; padding:14px; }

  /* Today */
  .today { max-width:640px; margin:0 auto; }
  .hrow { display:flex; align-items:center; gap:12px; padding:12px 0; border-top:1px solid var(--border); }
  .hrow:first-child { border-top:none; }
  .hicon { font-size:20px; width:24px; text-align:center; flex:0 0 auto; }
  .hname { flex:1 1 auto; }
  .hname .rest { color:var(--muted); font-size:12px; margin-left:6px; }
  .streak { display:inline-flex; align-items:center; gap:3px; font-size:12px; padding:2px 8px; border-radius:999px; background:rgba(196,121,0,.13); color:var(--warning); white-space:nowrap; }
  .check { width:28px; height:28px; border-radius:50%; border:2px solid var(--muted-2); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .check.done { background:var(--success); border-color:var(--success); color:#fff; }
  .check.done::after { content:"✓"; font-size:15px; }
  .counter { display:inline-flex; align-items:center; gap:6px; flex:0 0 auto; }
  .counter .val { min-width:54px; text-align:center; font-size:13px; }
  .counter button { border:1px solid var(--border); width:26px; height:26px; padding:0; border-radius:6px; }
  .pbar { height:6px; border-radius:999px; background:var(--panel); margin:8px 0 0 36px; overflow:hidden; }
  .pbar > span { display:block; height:100%; background:var(--accent); }
  .addhabit { margin-top:14px; }

  /* Grid */
  .grid-wrap { overflow-x:auto; }
  table.grid { border-collapse:collapse; }
  table.grid th, table.grid td { padding:2px; text-align:center; }
  table.grid th.dow { font-weight:400; color:var(--muted-2); font-size:10px; width:20px; }
  table.grid td.label { text-align:left; white-space:nowrap; padding-right:10px; }
  .cell { width:18px; height:18px; border-radius:4px; background:var(--panel); display:inline-block; cursor:pointer; border:1px solid transparent; }
  .cell.done { background:var(--success); }
  .cell.today { border-color:var(--accent); }
  .cell.off { opacity:.4; cursor:default; }

  /* Stats */
  .stat-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; }
  .scard { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
  .scard h4 { margin:0 0 8px; font-size:14px; display:flex; align-items:center; gap:8px; }
  .smetrics { display:flex; gap:14px; flex-wrap:wrap; }
  .smetric .n { font-size:20px; font-weight:700; }
  .smetric .l { font-size:11px; color:var(--muted); }
  .wk { display:flex; gap:3px; margin-top:8px; }
  .wk span { width:14px; height:14px; border-radius:3px; background:var(--panel-2); border:1px solid var(--border); }
  .wk span.on { background:var(--success); border-color:var(--success); }

  /* Modal */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-start; justify-content:center; z-index:50; overflow:auto; padding:40px 16px; }
  .overlay.open { display:flex; }
  .modal { background:var(--bg); border:1px solid var(--border); border-radius:12px; width:100%; max-width:480px; box-shadow:var(--shadow); }
  .modal-head { display:flex; align-items:center; gap:8px; padding:12px 14px; border-bottom:1px solid var(--border); }
  .modal-body { padding:14px; display:flex; flex-direction:column; gap:12px; }
  .modal-foot { display:flex; justify-content:space-between; padding:12px 14px; border-top:1px solid var(--border); }
  .field label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; font-weight:600; }
  .field-row { display:flex; gap:10px; }
  .field-row > .field { flex:1; }
  .dows { display:flex; gap:5px; flex-wrap:wrap; }
  .dow-btn { border:1px solid var(--border); border-radius:6px; padding:5px 9px; cursor:pointer; }
  .dow-btn.on { background:var(--accent); color:var(--accent-fg); border-color:var(--accent); }
  .iconpick { display:flex; gap:6px; flex-wrap:wrap; }
  .iconpick button { font-size:18px; border:1px solid var(--border); width:36px; height:34px; padding:0; }
  .iconpick button.on { border-color:var(--accent); background:var(--panel); }
  .swatches { display:flex; gap:6px; flex-wrap:wrap; }
  .swatches button { width:26px; height:26px; border-radius:50%; border:2px solid transparent; padding:0; }
  .swatches button.on { border-color:var(--fg); }
  .small { font-size:12px; color:var(--muted); }
  .empty { color:var(--muted); text-align:center; padding:40px 12px; }
  .iconbtn { padding:4px 6px; color:var(--muted); }
  .iconbtn:hover { color:var(--fg); }
</style>
</head>
<body>
<div id="app">
  <div class="toolbar">
    <div class="seg" id="viewSeg">
      <button data-view="today">Today</button>
      <button data-view="grid">Grid</button>
      <button data-view="stats">Stats</button>
    </div>
    <span class="grow"></span>
    <button class="ghost" id="undoBtn" title="Undo (Ctrl/Cmd+Z)">↶ Undo</button>
    <button class="ghost" id="addBtn">+ Habit</button>
  </div>
  <div class="subhead" id="subhead"></div>
  <div class="surface" id="surface"></div>
</div>

<!-- Habit editor -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <input id="h_name" type="text" placeholder="Habit name" />
      <button class="iconbtn" id="h_close" title="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Icon</label>
        <div class="iconpick" id="h_icons"></div>
      </div>
      <div class="field">
        <label>Color</label>
        <div class="swatches" id="h_colors"></div>
      </div>
      <div class="field">
        <label>Schedule</label>
        <select id="h_sched">
          <option value="daily">Every day</option>
          <option value="days">Specific weekdays</option>
          <option value="weekly">Weekly target</option>
        </select>
      </div>
      <div class="field" id="h_daysWrap" style="display:none;">
        <label>Days</label>
        <div class="dows" id="h_days"></div>
      </div>
      <div class="field" id="h_targetWrap" style="display:none;">
        <label>Times per week</label>
        <input id="h_target" type="number" min="1" max="7" value="3" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Tracking</label>
          <select id="h_track">
            <option value="check">Check off</option>
            <option value="count">Count toward a goal</option>
          </select>
        </div>
        <div class="field" id="h_goalWrap" style="display:none;">
          <label>Daily goal</label>
          <input id="h_goal" type="number" min="1" value="1" />
        </div>
        <div class="field" id="h_unitWrap" style="display:none;">
          <label>Unit</label>
          <input id="h_unit" type="text" placeholder="min, pages…" />
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="danger" id="h_delete">Delete</button>
      <span style="display:flex; gap:10px; align-items:center;">
        <button class="ghost" id="h_archive">Archive</button>
        <button class="primary" id="h_save">Save &amp; Close</button>
      </span>
    </div>
  </div>
</div>

<script>
"use strict";
/* ===========================================================================
   PART 1 — Standard Notes component bridge (vanilla port of the documented
   component-relay protocol). No build step, no dependencies.
   =========================================================================== */
const SNBridge = (function () {
  const Action = { StreamContextItem:'stream-context-item', SaveItems:'save-items',
    ComponentRegistered:'component-registered', ActivateThemes:'themes', ThemesActivated:'themes-activated', SetComponentData:'set-component-data' };
  const API_COMPONENT = 'component';
  let sessionKey=null, environment=null, platform=null, lastItem=null;
  const sentMessages=[], queue=[]; let activeThemes=[], onNote=null, saveTimer=null, saveDelay=250, standalone=false;
  function uuid(){ if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);}); }
  function isMobile(){ return environment==='mobile'; }
  function post(action,data,callback){ if(!sessionKey){ queue.push({action,data,callback}); return; }
    const message={action,data,messageId:uuid(),sessionKey,api:API_COMPONENT};
    const stored=JSON.parse(JSON.stringify(message)); stored.callback=callback; sentMessages.push(stored);
    window.parent.postMessage(isMobile()?JSON.stringify(message):message,'*'); }
  function handle(payload){ if(!payload||!payload.action) return;
    if(payload.action===Action.ComponentRegistered){ sessionKey=payload.sessionKey; const d=payload.data||{};
      environment=d.environment; platform=d.platform; const pend=queue.splice(0,queue.length); pend.forEach(m=>post(m.action,m.data,m.callback));
      activateThemes(d.activeThemeUrls||[]); post(Action.ThemesActivated,{}); post(Action.StreamContextItem,{},onStreamed); return; }
    if(payload.action===Action.ActivateThemes){ activateThemes((payload.data&&payload.data.themes)||[]); return; }
    if(!payload.original) return; const idx=sentMessages.findIndex(m=>m.messageId===payload.original.messageId);
    if(idx===-1) return; const o=sentMessages[idx]; if(o.callback) o.callback(payload.data); }
  function onStreamed(data){ const item=data&&data.item; if(!item) return; lastItem=item; if(item.isMetadataUpdate) return; if(onNote) onNote(text()); }
  function text(){ return (lastItem&&lastItem.content&&lastItem.content.text)||''; }
  function save(newText,previewText){ if(standalone) return; if(!lastItem) return; lastItem.content.text=newText;
    if(typeof previewText==='string') lastItem.content.preview_plain=previewText; if(saveTimer) clearTimeout(saveTimer); saveTimer=setTimeout(flush,saveDelay); }
  function flush(){ if(!lastItem) return; const copy=Object.assign({},lastItem); copy.children=null; copy.parent=null; post(Action.SaveItems,{items:[copy]}); }
  function activateThemes(urls){ if(activeThemes.sort().toString()===urls.slice().sort().toString()) return;
    Array.from(document.getElementsByClassName('sn-theme')).forEach(el=>el.remove());
    urls.forEach(url=>{ if(!url) return; const link=document.createElement('link'); link.className='sn-theme'; link.rel='stylesheet'; link.type='text/css'; link.href=url; document.head.appendChild(link); }); activeThemes=urls; }
  function listen(){ const onMsg=(event)=>{ let data=event.data; if(typeof data==='string'){ try{data=JSON.parse(data);}catch(e){return;} } handle(data); };
    window.addEventListener('message',onMsg,false); document.addEventListener('message',onMsg,false); }
  return { init(opts){ opts=opts||{}; saveDelay=typeof opts.debounceSave==='number'?opts.debounceSave:250; onNote=opts.onNote||null; listen();
      setTimeout(()=>{ if(!sessionKey){ standalone=true; if(opts.onStandalone) opts.onStandalone(); } },600); },
    save, flushNow:flush, isStandalone(){return standalone;} };
})();

/* ===========================================================================
   PART 2 — Habit tracker application. Data is JSON stored in the note text.
   =========================================================================== */
const App = (function () {
  const SCHEMA = 1;
  const COLORS = ['#2f6fed','#30a46c','#f5a623','#e5484d','#8e4ec6','#0aa5b8','#d6409f','#a18072'];
  const ICONS = ['🚴','💪','📖','✍️','🏃','🧘','💧','🥗','😴','🎸','🧹','💊','☀️','📵'];

  let data=null, dirty=false, editingId=null, standalone=false;
  const undoStack=[]; let lastSerialized=null;

  /* ---- persistence ---- */
  function id(){ return (window.crypto&&crypto.randomUUID)?crypto.randomUUID().slice(0,8):Math.random().toString(36).slice(2,10); }
  function defaultData(){
    const mk = (name,icon,color)=>({ id:id(), name, icon, color, schedule:{type:'daily'}, track:'check', goal:1, unit:'', archived:false, createdAt:new Date().toISOString() });
    return { schema:SCHEMA,
      habits:[ mk('Cycling','🚴',COLORS[0]), mk('Off-bike exercise','💪',COLORS[1]), mk('Reading','📖',COLORS[2]), mk('Writing','✍️',COLORS[3]) ],
      log:{}, ui:{ view:'today' } };
  }
  function load(text){
    let parsed=null; if(text&&text.trim()){ try{parsed=JSON.parse(text);}catch(e){parsed=null;} }
    if(!parsed||!Array.isArray(parsed.habits)) data=defaultData(); else data=migrate(parsed);
    if(standalone){ try{ const s=localStorage.getItem('sn-habits-standalone'); if(s) data=migrate(JSON.parse(s)); }catch(e){} }
    lastSerialized=JSON.stringify(data); undoStack.length=0; render();
  }
  function migrate(d){ d.schema=d.schema||1; d.habits=d.habits||[]; d.log=d.log||{}; d.ui=d.ui||{view:'today'};
    d.habits.forEach(h=>{ h.schedule=h.schedule||{type:'daily'}; if(typeof h.archived==='undefined') h.archived=false; if(!h.track) h.track='check'; if(typeof h.goal==='undefined') h.goal=1; }); return d; }
  function saveOut(){ const t=JSON.stringify(data); lastSerialized=t; if(standalone){ try{localStorage.setItem('sn-habits-standalone',t);}catch(e){} return; } SNBridge.save(t, previewText()); }
  function persist(){ dirty=true; if(lastSerialized!==null){ const cur=JSON.stringify(data); if(cur!==lastSerialized){ undoStack.push(lastSerialized); if(undoStack.length>60) undoStack.shift(); } } saveOut(); }
  function undo(){ if(!undoStack.length) return; data=migrate(JSON.parse(undoStack.pop())); saveOut(); render(); }
  function previewText(){ const today=todayStr(); const act=data.habits.filter(h=>!h.archived);
    const done=act.filter(h=>scheduledOn(h,today)&&isDoneOn(h,today)).length; const due=act.filter(h=>scheduledOn(h,today)).length;
    return done+' / '+due+' habits done today · '+act.length+' tracked'; }

  /* ---- date helpers ---- */
  function todayStr(){ const d=new Date(); d.setHours(0,0,0,0); return toISODate(d); }
  function toISODate(d){ const z=new Date(d.getTime()-d.getTimezoneOffset()*60000); return z.toISOString().slice(0,10); }
  function addDays(iso,n){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return toISODate(d); }
  function startOfWeek(iso){ const d=new Date(iso+'T00:00:00'); const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off); return toISODate(d); } // Monday
  function fmtDate(iso){ return new Date(iso+'T00:00:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); }

  /* ---- habit logic ---- */
  function scheduledOn(h,iso){ const s=h.schedule||{type:'daily'};
    if(s.type==='days'){ const d=new Date(iso+'T00:00:00').getDay(); return (s.days||[]).includes(d); }
    return true; } // daily and weekly: every day is a candidate
  function logVal(h,iso){ return (data.log[h.id]||{})[iso]; }
  function isDoneOn(h,iso){ const v=logVal(h,iso); if(h.track==='count') return (typeof v==='number')&&v>=(h.goal||1); return v===true; }
  function setLog(h,iso,value){ const m=data.log[h.id]=data.log[h.id]||{}; if(value===false||value==null||value===0) delete m[iso]; else m[iso]=value;
    if(Object.keys(m).length===0) delete data.log[h.id]; }
  function toggleCheck(h,iso){ setLog(h,iso, logVal(h,iso)===true?false:true); }
  function incCount(h,iso,delta){ const cur=(typeof logVal(h,iso)==='number')?logVal(h,iso):0; setLog(h,iso,Math.max(0,cur+delta)); }
  function countInWeek(h,weekStart){ let c=0; const today=todayStr(); for(let i=0;i<7;i++){ const d=addDays(weekStart,i); if(d<=today&&isDoneOn(h,d)) c++; } return c; }

  function currentStreak(h){
    const today=todayStr();
    if((h.schedule||{}).type==='weekly'){
      const target=(h.schedule.target)||1; let streak=0; let wk=startOfWeek(today);
      if(countInWeek(h,wk)>=target) streak++;
      let prev=addDays(wk,-7); while(true){ if(countInWeek(h,prev)>=target){ streak++; prev=addDays(prev,-7); } else break; } return streak;
    }
    let streak=0; let cursor=today;
    while(true){ if(scheduledOn(h,cursor)){ if(isDoneOn(h,cursor)) streak++; else if(cursor===today){ /* today pending */ } else break; }
      cursor=addDays(cursor,-1); if(cursor<'2000-01-01') break; }
    return streak;
  }
  function longestStreak(h){
    const today=todayStr(); const logDates=Object.keys(data.log[h.id]||{});
    if((h.schedule||{}).type==='weekly'){ if(!logDates.length) return 0; const target=(h.schedule.target)||1;
      let wk=startOfWeek(logDates.reduce((a,b)=>a<b?a:b)); const end=startOfWeek(today); let best=0,run=0;
      while(wk<=end){ if(countInWeek(h,wk)>=target){ run++; best=Math.max(best,run);} else run=0; wk=addDays(wk,7); } return best; }
    const start = h.createdAt ? h.createdAt.slice(0,10) : (logDates.length?logDates.reduce((a,b)=>a<b?a:b):today);
    let best=0,run=0,d=start; while(d<=today){ if(scheduledOn(h,d)){ if(isDoneOn(h,d)){ run++; best=Math.max(best,run);} else run=0; } d=addDays(d,1); } return best;
  }
  function completionRate(h,days){ const today=todayStr(); let sched=0,done=0;
    for(let i=0;i<days;i++){ const d=addDays(today,-i); if(scheduledOn(h,d)){ sched++; if(isDoneOn(h,d)) done++; } } return sched?Math.round(done/sched*100):0; }
  function totalDone(h){ const m=data.log[h.id]||{}; return Object.keys(m).filter(k=>isDoneOn(h,k)).length; }

  /* ---- rendering ---- */
  const $=s=>document.querySelector(s);
  const el=(tag,cls,html)=>{ const e=document.createElement(tag); if(cls) e.className=cls; if(html!=null) e.innerHTML=html; return e; };
  const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function render(){
    if(!data) return;
    document.querySelectorAll('#viewSeg button').forEach(b=>b.classList.toggle('active', b.dataset.view===data.ui.view));
    const ub=$('#undoBtn'); if(ub){ ub.disabled=!undoStack.length; ub.style.opacity=undoStack.length?'1':'.4'; }
    const today=todayStr(); const act=data.habits.filter(h=>!h.archived);
    const due=act.filter(h=>scheduledOn(h,today)); const done=due.filter(h=>isDoneOn(h,today));
    $('#subhead').textContent = fmtDate(today) + '  ·  ' + done.length + ' of ' + due.length + ' done today';
    const s=$('#surface'); s.innerHTML='';
    if(data.ui.view==='grid') s.appendChild(renderGrid());
    else if(data.ui.view==='stats') s.appendChild(renderStats());
    else s.appendChild(renderToday());
  }

  function renderToday(){
    const wrap=el('div','today'); const today=todayStr();
    const act=data.habits.filter(h=>!h.archived);
    if(!act.length){ wrap.appendChild(el('div','empty','No habits yet. Use “+ Habit” to add one.')); return wrap; }
    act.forEach(h=>{
      const row=el('div','hrow');
      const ic=el('div','hicon'); ic.textContent=h.icon||'•'; ic.style.color=h.color||'var(--fg)';
      const scheduled=scheduledOn(h,today);
      const name=el('div','hname'); name.innerHTML=esc(h.name)+(scheduled?'':'<span class="rest">rest day</span>');
      const streak=currentStreak(h);
      const sb=el('span','streak','🔥 '+streak); sb.title='Current streak';
      row.appendChild(ic); row.appendChild(name); if(streak>0) row.appendChild(sb);
      if(h.track==='count'){
        const v=(typeof logVal(h,today)==='number')?logVal(h,today):0;
        const c=el('div','counter');
        const minus=el('button',null,'−'); minus.onclick=()=>{ incCount(h,today,-1); persist(); render(); };
        const val=el('span','val', v+' / '+(h.goal||1)+(h.unit?(' '+esc(h.unit)):''));
        const plus=el('button',null,'+'); plus.onclick=()=>{ incCount(h,today,1); persist(); render(); };
        c.appendChild(minus); c.appendChild(val); c.appendChild(plus); row.appendChild(c);
      } else {
        const chk=el('div','check'+(isDoneOn(h,today)?' done':'')); chk.onclick=()=>{ toggleCheck(h,today); persist(); render(); };
        row.appendChild(chk);
      }
      row.querySelector('.hname').onclick=()=>openEditor(h.id);
      ic.onclick=()=>openEditor(h.id);
      wrap.appendChild(row);
      if(h.track==='count'){ const v=(typeof logVal(h,today)==='number')?logVal(h,today):0; const pct=Math.min(100,Math.round(v/(h.goal||1)*100));
        const pb=el('div','pbar','<span style="width:'+pct+'%; background:'+(h.color||'var(--accent)')+'"></span>'); wrap.appendChild(pb); }
    });
    return wrap;
  }

  function renderGrid(){
    const wrap=el('div','grid-wrap'); const DAYS=21; const today=todayStr();
    const act=data.habits.filter(h=>!h.archived);
    if(!act.length){ wrap.appendChild(el('div','empty','No habits yet.')); return wrap; }
    const table=el('table','grid');
    const head=el('tr'); head.appendChild(el('th','label',''));
    const DOW=['M','T','W','T','F','S','S'];
    for(let i=DAYS-1;i>=0;i--){ const d=addDays(today,-i); const dow=(new Date(d+'T00:00:00').getDay()+6)%7; head.appendChild(el('th','dow',DOW[dow])); }
    table.appendChild(head);
    act.forEach(h=>{
      const tr=el('tr'); const lbl=el('td','label'); lbl.innerHTML='<span style="color:'+(h.color||'var(--fg)')+'">'+(h.icon||'•')+'</span> '+esc(h.name);
      lbl.style.cursor='pointer'; lbl.onclick=()=>openEditor(h.id); tr.appendChild(lbl);
      for(let i=DAYS-1;i>=0;i--){ const d=addDays(today,-i); const td=el('td');
        const sched=scheduledOn(h,d); const done=isDoneOn(h,d);
        const cell=el('span','cell'+(done?' done':'')+(d===today?' today':'')+(sched?'':' off'));
        if(done) cell.style.background=h.color||'var(--success)';
        if(sched){ cell.title=d; cell.onclick=()=>{ if(h.track==='count') setLog(h,d, done?false:(h.goal||1)); else toggleCheck(h,d); persist(); render(); }; }
        td.appendChild(cell); tr.appendChild(td); }
      table.appendChild(tr);
    });
    wrap.appendChild(table);
    wrap.appendChild(el('div','small','Tap any day to mark it done — handy for backfilling. Outlined square is today.'));
    return wrap;
  }

  function renderStats(){
    const wrap=el('div','stat-cards'); const act=data.habits.filter(h=>!h.archived);
    if(!act.length){ wrap.appendChild(el('div','empty','No habits yet.')); return wrap; }
    const today=todayStr();
    act.forEach(h=>{
      const card=el('div','scard');
      card.appendChild(el('h4','', '<span style="color:'+(h.color||'var(--fg)')+'">'+(h.icon||'•')+'</span> '+esc(h.name)));
      const metric=(n,l)=>'<div class="smetric"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';
      const m=el('div','smetrics'); m.innerHTML = metric(currentStreak(h),'Current streak')+metric(longestStreak(h),'Longest')+metric(completionRate(h,30)+'%','30-day')+metric(totalDone(h),'Total');
      card.appendChild(m);
      const wk=el('div','wk'); const lbl=['M','T','W','T','F','S','S']; const ws=startOfWeek(today);
      for(let i=0;i<7;i++){ const d=addDays(ws,i); const on=(d<=today)&&isDoneOn(h,d); const sp=el('span',on?'on':''); if(on) sp.style.background=h.color||'var(--success)'; sp.title=d; wk.appendChild(sp); }
      card.appendChild(el('div','small','This week')); card.appendChild(wk);
      wrap.appendChild(card);
    });
    return wrap;
  }

  /* ---- habit editor ---- */
  let pickIcon=ICONS[0], pickColor=COLORS[0], pickDays=[1,2,3,4,5];
  function openEditor(hid){
    editingId=hid; const h=data.habits.find(x=>x.id===hid); if(!h) return;
    $('#h_name').value=h.name; pickIcon=h.icon||ICONS[0]; pickColor=h.color||COLORS[0];
    $('#h_sched').value=(h.schedule&&h.schedule.type)||'daily';
    pickDays=(h.schedule&&h.schedule.days&&h.schedule.days.slice())||[1,2,3,4,5];
    $('#h_target').value=(h.schedule&&h.schedule.target)||3;
    $('#h_track').value=h.track||'check'; $('#h_goal').value=h.goal||1; $('#h_unit').value=h.unit||'';
    $('#h_archive').textContent=h.archived?'Unarchive':'Archive';
    renderIconPick(); renderColorPick(); renderDayPick(); syncSchedFields();
    $('#overlay').classList.add('open'); $('#h_name').focus();
  }
  function renderIconPick(){ const box=$('#h_icons'); box.innerHTML=''; ICONS.forEach(ic=>{ const b=el('button',pickIcon===ic?'on':'',ic); b.onclick=()=>{ pickIcon=ic; renderIconPick(); }; box.appendChild(b); }); }
  function renderColorPick(){ const box=$('#h_colors'); box.innerHTML=''; COLORS.forEach(c=>{ const b=el('button',pickColor===c?'on':''); b.style.background=c; b.onclick=()=>{ pickColor=c; renderColorPick(); }; box.appendChild(b); }); }
  function renderDayPick(){ const box=$('#h_days'); box.innerHTML=''; const lbl=['Su','Mo','Tu','We','Th','Fr','Sa'];
    for(let d=0;d<7;d++){ const b=el('button','dow-btn'+(pickDays.includes(d)?' on':''),lbl[d]); b.onclick=()=>{ if(pickDays.includes(d)) pickDays=pickDays.filter(x=>x!==d); else pickDays.push(d); renderDayPick(); }; box.appendChild(b); } }
  function syncSchedFields(){ const t=$('#h_sched').value; $('#h_daysWrap').style.display=t==='days'?'block':'none'; $('#h_targetWrap').style.display=t==='weekly'?'block':'none';
    const tr=$('#h_track').value; const count=tr==='count'; $('#h_goalWrap').style.display=count?'block':'none'; $('#h_unitWrap').style.display=count?'block':'none'; }
  function commitEditor(){ if(!editingId) return; const h=data.habits.find(x=>x.id===editingId); if(!h) return;
    h.name=$('#h_name').value.trim()||'Untitled'; h.icon=pickIcon; h.color=pickColor;
    const t=$('#h_sched').value; const sched={type:t}; if(t==='days') sched.days=pickDays.slice().sort(); if(t==='weekly') sched.target=Math.max(1,Math.min(7,parseInt($('#h_target').value,10)||3));
    h.schedule=sched; h.track=$('#h_track').value; h.goal=Math.max(1,parseInt($('#h_goal').value,10)||1); h.unit=$('#h_unit').value.trim(); persist(); }
  function closeEditor(){ commitEditor(); editingId=null; $('#overlay').classList.remove('open'); render(); }

  /* ---- wiring ---- */
  function wire(){
    document.querySelectorAll('#viewSeg button').forEach(b=>{ b.onclick=()=>{ data.ui.view=b.dataset.view; saveOut(); render(); }; });
    $('#addBtn').onclick=()=>{ const h={ id:id(), name:'New habit', icon:ICONS[Math.floor(Math.random()*ICONS.length)], color:COLORS[data.habits.length%COLORS.length], schedule:{type:'daily'}, track:'check', goal:1, unit:'', archived:false, createdAt:new Date().toISOString() };
      data.habits.push(h); persist(); render(); openEditor(h.id); };
    $('#undoBtn').onclick=undo;
    $('#h_close').onclick=closeEditor; $('#h_save').onclick=closeEditor;
    $('#overlay').addEventListener('mousedown',e=>{ if(e.target.id==='overlay') closeEditor(); });
    $('#h_sched').onchange=()=>{ syncSchedFields(); commitEditor(); }; $('#h_track').onchange=()=>{ syncSchedFields(); commitEditor(); };
    ['h_name','h_target','h_goal','h_unit'].forEach(idn=>{ const e=document.getElementById(idn); e.onchange=commitEditor; });
    $('#h_archive').onclick=()=>{ const h=data.habits.find(x=>x.id===editingId); if(!h) return; h.archived=!h.archived; editingId=null; $('#overlay').classList.remove('open'); persist(); render(); };
    $('#h_delete').onclick=()=>{ if(!editingId) return; const tid=editingId;
      uiConfirm('Delete this habit and its history?', ()=>{ data.habits=data.habits.filter(x=>x.id!==tid); delete data.log[tid]; editingId=null; $('#overlay').classList.remove('open'); persist(); render(); }); };
    document.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&(e.key==='z'||e.key==='Z')){ e.preventDefault(); undo(); } if(e.key==='Escape'&&$('#overlay').classList.contains('open')) closeEditor(); });
    window.addEventListener('beforeunload',()=>{ if(dirty) SNBridge.flushNow(); });
  }

  function uiConfirm(message,onYes){
    const ov=el('div','overlay'); ov.style.display='flex'; ov.style.zIndex='100';
    const box=el('div','modal'); box.style.maxWidth='360px';
    box.appendChild(el('div','modal-body','<div>'+esc(message)+'</div>'));
    const foot=el('div','modal-foot'); foot.style.justifyContent='flex-end'; foot.style.gap='8px';
    const cancel=el('button','ghost','Cancel'); const yes=el('button','primary','Delete'); yes.style.background='var(--danger)'; yes.style.borderColor='var(--danger)';
    foot.appendChild(cancel); foot.appendChild(yes); box.appendChild(foot); ov.appendChild(box); document.body.appendChild(ov);
    cancel.onclick=()=>ov.remove(); ov.addEventListener('mousedown',e=>{ if(e.target===ov) ov.remove(); }); yes.onclick=()=>{ ov.remove(); onYes(); };
  }

  return { start(){ wire(); SNBridge.init({ debounceSave:250, onNote:(text)=>{ standalone=false; load(text); }, onStandalone:()=>{ standalone=true; load(''); } }); } };
})();

document.addEventListener('DOMContentLoaded', App.start);
</script>
</body>
</html>
